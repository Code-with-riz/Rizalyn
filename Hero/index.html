<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Portfolio</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="sidebar" aria-label="Main navigation">
    <div class="sidebar-logo"><span>R</span></div>

    <button class="nav-item active" aria-label="Home" onclick="window.location.href='../Hero/index.html'">
      <i class="ti ti-home" aria-hidden="true"></i>
      <span>Home</span>
    </button>
    <button class="nav-item" aria-label="About Me" onclick="window.location.href='../About/about.html'">
      <i class="ti ti-user" aria-hidden="true"></i>
      <span>About</span>
    </button>
    <button class="nav-item" aria-label="Projects" onclick="window.location.href='../Project/projects.html'">
      <i class="ti ti-layout-grid" aria-hidden="true"></i>
      <span>Projects</span>
    </button>
    <button class="nav-item" aria-label="Contact" onclick="window.location.href='../Contact/contacts.html'">
      <i class="ti ti-mail" aria-hidden="true"></i>
      <span>Contact</span>
    </button>

    <div class="sidebar-spacer"></div>
  </nav>

  <main class="main">
    <div class="card">

      <!-- Top: avatar + name block -->
      <div class="hero-top">
        <div class="avatar-ring">
          <img src="mypicriz.jpg" alt="Rizalyn Magada" class="avatar-photo" />
        </div>

        <div class="hero-intro">
          <h1 class="name">Rizalyn Magada</h1>
          <p class="title">Creative Developer &amp; Designer</p>
          <div class="divider"></div>

          <div class="bio-wrap">
            <p class="bio" id="bio">
              "Coding my way to the future" <br><br>
              Being an IT student is more than just learning how to code or fix computers. It's about having the patience to solve problems, and an IT student doesn't just study technology — they create possibilities.
            </p>
            <button class="read-more-btn" id="readMoreBtn">Read more</button>
          </div>

          <div class="hero-actions">
            <button class="btn" onclick="window.location.href='../Project/projects.html'">
              <i class="ti ti-layout-grid"></i> View Projects
            </button>
            <button class="btn btn-outline" onclick="window.location.href='../Contact/contacts.html'">
              <i class="ti ti-mail"></i> Contact Me
            </button>
          </div>
        </div>
      </div>

      <!-- Divider -->
      <div class="section-divider"></div>

    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
