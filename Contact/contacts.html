<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Me</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="contacts.css" />
</head>
<body>

  <nav class="sidebar" aria-label="Main navigation">
    <div class="sidebar-logo"><span>R</span></div>

    <button class="nav-item" aria-label="Home" onclick="window.location.href='../Hero page/index.html'">
      <i class="ti ti-home" aria-hidden="true"></i>
      <span>Home</span>
    </button>
    <button class="nav-item" aria-label="About Me" onclick="window.location.href='../About page/about.html'">
      <i class="ti ti-user" aria-hidden="true"></i>
      <span>About</span>
    </button>
    <button class="nav-item" aria-label="Projects" onclick="window.location.href='../Project page/projects.html'">
      <i class="ti ti-layout-grid" aria-hidden="true"></i>
      <span>Projects</span>
    </button>
    <button class="nav-item active" aria-label="Contact" onclick="window.location.href='../Contact page/contacts.html'">
      <i class="ti ti-mail" aria-hidden="true"></i>
      <span>Contact</span>
    </button>

    <div class="sidebar-spacer"></div>

    
  </nav>

  <main class="main">
    <div class="contact-card">
      <div class="contact-info">
        <h2 class="section-label">Contact Me</h2>

        <a class="social-link" href="https://www.facebook.com/rizalyn.magada" target="_blank" rel="noopener">
          <div class="social-icon"><i class="ti ti-brand-facebook" aria-hidden="true"></i></div>
          Like me on Facebook
        </a>
        <a class="social-link" href="https://www.instagram.com/rizrizziee/" target="_blank" rel="noopener">
          <div class="social-icon"><i class="ti ti-brand-instagram" aria-hidden="true"></i></div>
          Follow me on Instagram
        </a>
        <a class="social-link" href="https://github.com/Code-with-riz?tab=repositories">
          <div class="social-icon"><i class="ti ti-brand-github" aria-hidden="true"></i></div>
          Connect me on GitHub
        </a>
      </div>

      <div class="profile-photo">
        <img src="My Pic.jpg" alt="Rizalyn Magada" class="profile-img" />
      </div>
    </div>
  </main>

  <script src="contacts.js"></script>
</body>
</html>
